name: Update Radius

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  update-radius:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_sync_rc: ${{ steps.update.outputs.should_sync_rc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/update-radius.sh --ci --only-check

      - name: Update Radius sources
        id: update
        if: steps.check.outputs.should_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/update-radius.sh --ci

      - name: Commit source updates
        if: steps.check.outputs.should_update == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ steps.update.outputs.commit_message }}
          file_pattern: nix/sources.json

  sync-rc:
    needs: update-radius
    if: needs.update-radius.outputs.should_sync_rc == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync rc branch
        run: |
          git fetch origin main rc || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin rc >/dev/null 2>&1; then
            git checkout -B rc origin/rc
            git rebase origin/main
          else
            git checkout -B rc origin/main
          fi

          python <<'PY'
          from pathlib import Path
          path = Path("flake.nix")
          text = path.read_text()
          path.write_text(text.replace('defaultChannel = "stable";', 'defaultChannel = "rc";'))
          PY

          if ! git diff --quiet; then
            git add flake.nix
            git commit -m "chore(branch): set rc default aliases"
            git push --force-with-lease -u origin rc
          fi
