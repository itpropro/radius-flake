name: Update Radius

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0,12 * * *"

jobs:
  update-radius:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.2

      - name: Configure Cachix
        uses: cachix/cachix-action@v17
        with:
          name: itpropro
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/update-radius.sh --ci --only-check

      - name: Update Radius sources
        id: update
        if: steps.check.outputs.should_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/update-radius.sh --ci

      - name: Commit source updates
        if: steps.check.outputs.should_update == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: ${{ steps.update.outputs.commit_message }}
          file_pattern: nix/sources.json
