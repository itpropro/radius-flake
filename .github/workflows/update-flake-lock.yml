name: Update flake.lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1,15 * *"

jobs:
  update-lock:
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: DeterminateSystems/determinate-nix-action@v3.17.0
      - uses: DeterminateSystems/update-flake-lock@v28
        with:
          pr-title: "Update flake.lock"
          pr-labels: |
            dependencies
            automated
          commit-msg: |
            chore(flake): update lock file
